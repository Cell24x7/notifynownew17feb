<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NotifyNow Platform Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="NotifyNow Developer and Client Documentation">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root {
      --docsify-theme-color: #3b82f6;
    }

    .markdown-section {
      max-width: 900px;
    }

    .app-name-link img {
      width: 150px;
    }
  </style>
</head>

<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'NotifyNow Docs',
      repo: '',
      loadSidebar: true, // Enabled sidebar
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'DEVELOPER.md',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>

</html>
