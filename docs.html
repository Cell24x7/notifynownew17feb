<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotifyNow | Knowledge Base</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Highlight.js for Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            z-index: 100;
        }

        .sidebar-header {
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 3rem;
            scroll-behavior: smooth;
        }

        .content-wrap {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Markdown Styling */
        .markdown-content h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-content h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin: 2rem 0 1rem;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .markdown-content p {
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
        }

        .markdown-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .markdown-content pre {
            background: #011627;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            position: relative;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .markdown-content th {
            background: rgba(255, 255, 255, 0.05);
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .markdown-content td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--primary);
            background: rgba(139, 92, 246, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            aside {
                width: 0;
                overflow: hidden;
                position: fixed;
                height: 100%;
                top: 0;
                left: 0;
            }

            aside.open {
                width: 280px;
            }

            main {
                padding: 1.5rem;
            }
        }

        /* Custom Alert box derived from Markdown */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-note {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #60a5fa;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-box"><i data-lucide="zap" size="18"></i></div>
            <h2 style="font-family: 'Outfit'; font-size: 1.2rem;">NotifyNow Docs</h2>
        </div>
        <div class="sidebar-nav">
            <a onclick="loadDoc('README.md', this)" class="nav-item" data-source="root">
                <i data-lucide="info" size="18"></i> Getting Started
            </a>
            <a onclick="loadDoc('CHANGELOG.md', this)" class="nav-item active" data-source="changelog">
                <i data-lucide="history" size="18"></i> What's New
            </a>
            <div
                style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;">
                Documentation</div>
            <a onclick="loadDoc('USER_GUIDE.md', this)" class="nav-item">
                <i data-lucide="book-open" size="18"></i> User Guide
            </a>
            <a onclick="loadDoc('DEVELOPER.md', this)" class="nav-item">
                <i data-lucide="code" size="18"></i> Backend Dev
            </a>
            <a onclick="loadDoc('API_REFERENCE.md', this)" class="nav-item">
                <i data-lucide="terminal" size="18"></i> API Reference
            </a>
            <div
                style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;">
                Infrastructure</div>
            <a onclick="loadDoc('DEVELOPER.md', this, true)" class="nav-item">
                <i data-lucide="layers" size="18"></i> Platform Architecture
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main>
        <div class="content-wrap markdown-content" id="doc-container">
            <!-- Content will be injected here -->
        </div>
    </main>

    <script>
        // Use marked options for syntax highlighting
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            langPrefix: 'hljs language-'
        });

        async function loadDoc(fileName, element, isRoot = false) {
            const container = document.getElementById('doc-container');
            const loader = document.getElementById('loader');

            // Set active state
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            if (element) element.classList.add('active');

            loader.style.opacity = '1';
            loader.style.display = 'flex';

            try {
                // Adjust path based on file
                let path = '/docs-data/';
                if (fileName === 'CHANGELOG.md') path = '/changelog-data/';
                if (isRoot || fileName === 'README.md') path = '/root-docs/';

                const response = await fetch(path + fileName);
                if (!response.ok) throw new Error('File not found');

                const markdown = await response.text();
                container.innerHTML = marked.parse(markdown);

                // Initialize Lucide icons if any in MD
                lucide.createIcons();

                // Move to top
                document.querySelector('main').scrollTop = 0;
            } catch (err) {
                container.innerHTML = `<div class="alert alert-note"><h1>Oops!</h1><p>Failed to load documentation: ${err.message}</p></div>`;
            } finally {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 300);
            }
        }

        // Handle initial load
        window.onload = () => {
            loadDoc('CHANGELOG.md');
            lucide.createIcons();
        };
    </script>
</body>

</html>
